services:
  mongo:
    image: mongo:7
    container_name: careerpath-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: careerpath-ml
    restart: unless-stopped
    env_file:
      - ./ml-service/.env
    ports:
      - "8001:8001"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: careerpath-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
      - ml-service
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: careerpath-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  mongo_data:

